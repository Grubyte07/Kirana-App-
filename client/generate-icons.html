<!DOCTYPE html>
<html>
<head>
  <title>Generate Kirana Profit App Icons</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 40px auto; padding: 20px; }
    .icon-box { display: inline-block; margin: 10px; text-align: center; }
    canvas { border: 1px solid #ccc; border-radius: 12px; }
    button { margin-top: 8px; padding: 8px 16px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; }
    h1 { color: #333; }
  </style>
</head>
<body>
  <h1>Kirana Profit - Icon Generator</h1>
  <p>Click each button to download the icon. Save them to <code>client/public/icons/</code></p>
  <div id="icons"></div>

  <script>
    const sizes = [72, 96, 128, 144, 152, 192, 384, 512];

    function drawIcon(canvas, size) {
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const r = size * 0.18;

      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.clip();

      const grad = ctx.createLinearGradient(0, 0, size, size);
      grad.addColorStop(0, '#3b82f6');
      grad.addColorStop(1, '#1d4ed8');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, size, size);

      ctx.fillStyle = 'white';
      ctx.font = `bold ${size * 0.35}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('₹', size / 2, size * 0.4);

      ctx.font = `bold ${size * 0.12}px Arial`;
      ctx.fillText('PROFIT', size / 2, size * 0.68);

      ctx.font = `${size * 0.07}px Arial`;
      ctx.globalAlpha = 0.8;
      ctx.fillText('Manager', size / 2, size * 0.82);
    }

    const container = document.getElementById('icons');
    sizes.forEach(size => {
      const div = document.createElement('div');
      div.className = 'icon-box';
      const canvas = document.createElement('canvas');
      drawIcon(canvas, size);
      const btn = document.createElement('button');
      btn.textContent = `Download ${size}x${size}`;
      btn.onclick = () => {
        const link = document.createElement('a');
        link.download = `icon-${size}x${size}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      };
      div.appendChild(canvas);
      div.appendChild(btn);
      container.appendChild(div);
    });
  </script>
</body>
</html>
